name: Compile Agentic Workflows

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: 7474/gh-aw-compile-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
