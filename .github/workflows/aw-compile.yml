name: Compile Agentic Workflows

on:
  push:
    paths:
      - '**/*.md'
  pull_request:
    paths:
      - '**/*.md'

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: 7474/gh-aw-compile-action@ba88ab815b4c7de6e33d2bf3a77124ee37a3cb4c # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
