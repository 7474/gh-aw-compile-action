name: 'gh aw compile'
description: 'Install gh aw extension and compile GitHub Agentic Workflows'
inputs:
  token:
    description: 'GitHub token used by the gh CLI'
    required: false
    default: ${{ github.token }}
  version:
    description: 'Version of the gh-aw extension to install (e.g. v1.2.3). Installs the latest version if not specified.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Install gh aw extension
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        GH_AW_VERSION: ${{ inputs.version }}
      run: gh extension install github/gh-aw${GH_AW_VERSION:+ --pin "$GH_AW_VERSION"}
    - name: Compile Agentic Workflows
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: gh aw compile
